# 6時間毎に動画/配信一覧を更新（約21u/回 ≒ 84u/日）
name: update-contents
on:
  schedule:
    - cron: "10 */6 * * *"
  workflow_dispatch:
concurrency:
  group: data-json
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  contents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/fetch-contents.mjs
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_CHANNEL_ID: ${{ vars.YT_CHANNEL_ID }}
      - name: Commit if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/data/contents.json
          git diff --cached --quiet || git commit -m "chore(data): update contents.json [skip ci]"
          git pull --rebase && git push
