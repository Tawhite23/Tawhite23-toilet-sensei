# 15分毎に配信状態を確認し live.json をコミット（3u/回 ≒ 288u/日）
name: update-live
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
concurrency:
  group: data-json
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/fetch-live.mjs
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_CHANNEL_ID: ${{ vars.YT_CHANNEL_ID }}
      - name: Commit if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/data/live.json
          git diff --cached --quiet || git commit -m "chore(data): update live.json [skip ci]"
          git pull --rebase && git push
